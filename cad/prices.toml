# ===========================================================================
# prices.toml — FUENTE ÚNICA DE VERDAD para precios Co/2026
# ===========================================================================
# Precios de referencia del mercado colombiano 2026. Reemplazar low/mid/high
# con cotizaciones reales por línea cuando estén disponibles.
#
# Cambiar este archivo y correr `make all` regenera PRESUPUESTO.md.
# ===========================================================================

schema_version = "1.0"
currency       = "COP"
year           = 2026
region         = "Cundinamarca / altiplano cundiboyacense"
exchange_rate_usd_cop = 4000

[overhead]
indirect_pct   = 0.15      # 15% sobre directos
contingency_pct = 0.10     # 10% sobre directos
iva_pct        = 0.19      # 19% IVA Colombia

